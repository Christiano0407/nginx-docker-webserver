services:
  app1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app1
    environment:
      INSTANCE_NAME: app1
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - backend

  app2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app2
    environment:
      INSTANCE_NAME: app2
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - backend

  app3:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app3
    environment:
      INSTANCE_NAME: app3
      NODE_ENV: production
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx_reverse_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge